<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Гриша и ноутбук</title>
    <link rel="stylesheet" href="/help/style.css">
</head>
<body>

<div class="burger-btn" id="burgerBtn"><span></span><span></span><span></span></div>
<div class="settings-btn" id="settingsBtn">...</div>

<div class="sidebar" id="sidebar">
    <h2>Меню</h2>
    <div id="loggedOutView">
        <button id="showLoginBtn">Войти</button>
        <button id="showRegisterBtn">Регистрация</button>
    </div>
    <div id="loggedInView" style="display: none;">
        <p>Привет, <strong id="userNameDisplay"></strong>!</p>
        <p>🪙 <span id="coinBalance">0</span> монет</p>
        <button id="logoutBtn">Выйти</button>
    </div>
    <div id="loginForm" style="display: none;">
        <h3>Вход</h3>
        <input type="text" id="loginUsername" placeholder="Имя">
        <input type="password" id="loginPassword" placeholder="Пароль">
        <button id="submitLoginBtn">Войти</button>
        <button id="cancelLoginBtn">Отмена</button>
    </div>
    <div id="registerForm" style="display: none;">
        <h3>Регистрация</h3>
        <input type="text" id="regUsername" placeholder="Придумайте имя">
        <input type="password" id="regPassword" placeholder="Придумайте пароль">
        <button id="submitRegisterBtn">Зарегистрироваться</button>
        <button id="cancelRegisterBtn">Отмена</button>
    </div>
    <hr>
    <h2>Магазин тем</h2>
    <div id="themeShop"></div>
    <hr>
    <p style="font-size:0.9rem;"><strong>Авторы:</strong><br>👤 Александра<br>👤 Максим<br>👤 Артём<br>👤 Михаил<br>👤 Аркадий</p>
</div>

<div class="settings-modal" id="settingsModal">
    <div class="settings-panel">
        <h3>⚙️ Настройки</h3>
        <button id="promoCodeBtn" class="promo-btn">🎁 Промокоды</button>
        <button id="deleteAccountBtn" class="danger-btn">🗑️ Удалить аккаунт</button>
        <button id="resetProgressBtn" class="danger-btn">🔄 Сбросить прогресс</button>
        <button class="close-settings" id="closeSettingsBtn">Закрыть</button>
    </div>
</div>

<div class="app" id="appContainer">
    <div id="judgesScreen" class="screen">
        <h1>👨‍⚖️ Информация о сайте</h1>
        <div class="lesson-box" id="judgesContent"></div>
        <a href="">💸 Заказать курсы</a>
        
        <button id="startBtn">ОБРАТНО</button>
    </div>
</div>

<div class="footer">
    📞 Поддержка: +7 (981) 849-6432 &nbsp;|&nbsp; ✉️ aarkadij401@gmail.com
</div>

<script src="/help/script.js"></script>

</body>
</html>
